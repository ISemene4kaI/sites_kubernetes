replicaCount: 1

image:
  repository: ghcr.io/isemene4kai/semka-informatics
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

namespace: semka-informatics

ingress:
  enabled: true
  className: traefik
  host: isemene4kai.ru
  path: /
  pathType: Prefix

  tls:
    secretName: isemene4kai-ru-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

env:
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  FILES_DIR: "/app/app/code_storage"
  STATIC_DIR: "/app/app/static"
  TEMPLATES_DIR: "/app/app/templates"
  VIEWS_FILE: "/data/views.json"

secretEnv: {}

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /data
